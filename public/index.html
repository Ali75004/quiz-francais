<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#002395" />
  <meta name="description" content="Quiz de français – grammaire, conjugaison, vocabulaire" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Quiz Français" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <title>Quiz Français 🇫🇷</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- ─── SPLASH / START SCREEN ─────────────────────────── -->
  <div id="screen-start" class="screen active">
    <div class="start-card">
      <div class="tricolor-bar"></div>
      <h1>Quiz<br/><span>Français</span></h1>
      <p class="subtitle">Grammaire · Conjugaison · Vocabulaire</p>
      <div class="star-row">⭐⭐⭐⭐⭐</div>
      <button id="btn-start" class="btn-primary">Commencer !</button>
    </div>
  </div>

  <!-- ─── QUIZ SCREEN ───────────────────────────────────── -->
  <div id="screen-quiz" class="screen">
    <header class="quiz-header">
      <div class="progress-wrap">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <div class="quiz-meta">
        <span id="question-count">Question 1 / 20</span>
        <span id="score-display">Score : 0</span>
      </div>
    </header>

    <main class="quiz-body">
      <div id="question-card" class="question-card">
        <p id="question-category" class="question-category">Grammaire</p>
        <h2 id="question-text" class="question-text">Chargement…</h2>
      </div>

      <div id="choices" class="choices"></div>
    </main>
  </div>

  <!-- ─── END SCREEN ────────────────────────────────────── -->
  <div id="screen-end" class="screen">
    <div class="end-card">
      <div class="tricolor-bar"></div>
      <div id="end-emoji" class="end-emoji">🏆</div>
      <h2 id="end-title">Félicitations !</h2>
      <p id="end-score" class="end-score">Vous avez eu 18 / 20</p>
      <p id="end-message" class="end-message"></p>
      <button id="btn-restart" class="btn-primary">Rejouer</button>
    </div>
  </div>

  <!-- ─── POPUP (correct answer) ───────────────────────── -->
  <div id="popup-overlay" class="popup-overlay hidden" role="dialog" aria-modal="true">
    <div class="popup-card">
      <button id="popup-close" class="popup-close" aria-label="Fermer">✕</button>
      <div class="popup-bravo">🎉 Bravo !</div>
      <img id="popup-img" class="popup-img" src="" alt="Loulou" />
      <p id="popup-caption" class="popup-caption"></p>
      <button id="popup-next" class="btn-primary btn-small">Suivant →</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/questions.js"></script>
  <script src="/script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .catch(err => console.warn('SW registration failed:', err));
    }
  </script>
</body>
</html>
